name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: |
          find src tests -name "*.js" -exec node --check {} +
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Shellcheck scripts/
        run: |
          shopt -s nullglob
          files=(scripts/*.sh)
          if [ ${#files[@]} -gt 0 ]; then
            shellcheck -S warning "${files[@]}"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, registry-url: 'https://npm.pkg.github.com/', scope: '@callmetechie' }
      - run: npm ci
        env: { NODE_AUTH_TOKEN: '${{ secrets.GH_PACKAGES_TOKEN }}' }
      - run: npm run lint
      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with: { dockerfile: Dockerfile }
      - name: KICS (IaC)
        uses: checkmarx/kics-github-action@v2.1.20
        with:
          path: '.'
          fail_on: high
          exclude_queries: fd54f200-402c-4333-a5a4-36ef6709af2f

  simplification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npx jscpd src || true
      - run: npx knip || true

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: '${{ github.token }}' }

  dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, registry-url: 'https://npm.pkg.github.com/', scope: '@callmetechie' }
      - run: npm ci
        env: { NODE_AUTH_TOKEN: '${{ secrets.GH_PACKAGES_TOKEN }}' }
      - run: npm audit --audit-level=high
      - uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: github/codeql-action/init@v3
        with: { languages: javascript }
      - uses: github/codeql-action/analyze@v3
      - run: npx njsscan src || true

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix: { node: [20, 22] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', registry-url: 'https://npm.pkg.github.com/', scope: '@callmetechie' }
      - run: npm ci
        env: { NODE_AUTH_TOKEN: '${{ secrets.GH_PACKAGES_TOKEN }}' }
      - run: node --test --experimental-test-coverage --test-force-exit tests/ | tee test-output.txt
      - name: Check coverage
        run: |
          # Extract "all files" line coverage pct from node --test coverage block
          LINES=$(grep -oE 'all files[^0-9]+[0-9.]+[^0-9]+[0-9.]+[^0-9]+[0-9.]+' test-output.txt | head -1 | grep -oE '[0-9.]+' | tail -1 || echo "0")
          echo "Line coverage: $LINES%"
          if [ -z "$LINES" ] || [ "$LINES" = "0" ]; then
            echo "Could not parse coverage — skipping check (coverage report format may differ)"
            exit 0
          fi
          awk -v v="$LINES" 'BEGIN{exit (v+0 < 70)}' || { echo "Coverage below 70%"; exit 1; }

  mutation:
    runs-on: ubuntu-latest
    needs: unit
    # Run only when critical files change OR when PR has "mutation-test" label
    # (prevents feedback loop from chore: bump commits, doc-only pushes)
    if: |
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: bump version')) ||
      contains(github.event.pull_request.labels.*.name, 'mutation-test')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, registry-url: 'https://npm.pkg.github.com/', scope: '@callmetechie' }
      - run: npm ci
        env: { NODE_AUTH_TOKEN: '${{ secrets.GH_PACKAGES_TOKEN }}' }
      - run: npx stryker run
      - uses: actions/upload-artifact@v4
        with: { name: mutation-report, path: reports/mutation/ }
